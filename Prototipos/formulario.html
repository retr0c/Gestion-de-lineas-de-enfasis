<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Estudiante - Sistema de Gestión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --udem-rojo: #B71C1C;
      --udem-rojo-hover: #D32F2F;
      --udem-azul-secundario: #1976D2;
      --udem-azul-hover: #1565C0;
      --udem-verde-exito: #388E3C;
      --udem-amarillo: #FFA000;
    }
    .bg-udem-rojo { background-color: var(--udem-rojo) !important; }
    .bg-udem-rojo-hover:hover { background-color: var(--udem-rojo-hover) !important; }
    .bg-udem-azul { background-color: var(--udem-azul-secundario) !important; }
    .bg-udem-azul-hover:hover { background-color: var(--udem-azul-hover) !important; }
    .bg-udem-verde { background-color: var(--udem-verde-exito) !important; }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg" id="form-container">
    <h2 class="text-2xl font-bold text-center text-udem-rojo mb-6">Registro de Nuevo Estudiante</h2>
    <form class="space-y-4" id="registroForm" enctype="multipart/form-data">

      <div>
        <label for="cedula" class="block text-sm font-semibold text-gray-700">Cédula</label>
        <input type="text" id="cedula" name="cedula" required
          class="w-full border px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-udem-rojo">
      </div>

      <div>
        <label for="nombre" class="block text-sm font-semibold text-gray-700">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" required
          class="w-full border px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-udem-rojo">
      </div>

      <div>
        <label for="email" class="block text-sm font-semibold text-gray-700">Correo Electrónico</label>
        <input type="email" id="email" name="email" required
          class="w-full border px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-udem-rojo">
      </div>

      <div>
        <label for="programa" class="block text-sm font-semibold text-gray-700">Programa de Pregrado</label>
        <select id="programa" name="programa" required
          class="w-full border px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-udem-rojo">
          <option value="">Seleccione un programa</option>
          <option value="ingenieria">Ingeniería de Sistemas</option>
          <option value="diseno">Diseño Gráfico</option>
          <option value="ciencias">Ciencias de la Computación</option>
        </select>
      </div>

      <div>
        <label for="documentos" class="block text-sm font-semibold text-gray-700">Documentos Pertinentes</label>
        <input type="file" id="documentos" name="documentos" multiple required
          class="w-full border px-3 py-2 rounded-lg">
      </div>

      <button type="submit"
        class="w-full bg-udem-rojo text-white py-2 rounded-lg bg-udem-rojo-hover">
        Enviar Solicitud
      </button>
      <button type="button" onclick="volver()"
        class="w-full mt-2 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300">
        Volver
      </button>
    </form>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg hidden text-center" id="mensaje-container">
    <h2 class="text-2xl font-bold text-udem-verde mb-4">¡Registro completado!</h2>
    <p class="text-gray-600">La información se guardó correctamente.</p>
    <button onclick="volver()"
      class="mt-6 bg-udem-rojo text-white px-6 py-2 rounded-lg bg-udem-rojo-hover">
      Volver
    </button>
  </div>

  <script>
    document.getElementById('registroForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('form-container').classList.add('hidden');
      document.getElementById('mensaje-container').classList.remove('hidden');
    });

    function volver() {
      const urlParams = new URLSearchParams(window.location.search);
      const origen = urlParams.get('origen');
      if (origen === 'detalle') {
        window.location.href = "index.html#detalle";
      } else {
        window.history.back();
      }
    }
  </script>
</body>
</html>
