<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Notas - Profesor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --udem-azul-secundario: #1976D2;
      --udem-azul-hover: #1565C0;
      --udem-rojo: #B71C1C;
    }
    .bg-udem-azul { background-color: var(--udem-azul-secundario) !important; }
    .bg-udem-azul-hover:hover { background-color: var(--udem-azul-hover) !important; }
    .bg-udem-rojo { background-color: var(--udem-rojo) !important; }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <header class="bg-udem-azul shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-white">Gestión de Notas</h1>
    <button onclick="window.location.href='index.html#cursos-profesor'" 
      class="bg-white text-udem-azul px-4 py-2 rounded-lg hover:bg-gray-100">Volver</button>
  </header>

  <main class="p-6 max-w-5xl mx-auto">
    <div class="bg-white p-6 rounded-2xl shadow space-y-6">
      <h2 class="text-lg font-semibold text-udem-azul">Curso: Programación Avanzada (PROG401)</h2>

      <table class="w-full border rounded-lg overflow-hidden shadow">
        <thead class="bg-udem-azul text-white">
          <tr>
            <th class="p-3 text-left">Estudiante</th>
            <th class="p-3">Eval. 1 (25%)</th>
            <th class="p-3">Eval. 2 (25%)</th>
            <th class="p-3">Final (50%)</th>
            <th class="p-3">Promedio</th>
          </tr>
        </thead>
        <tbody class="text-gray-700">
          <tr class="border-t hover:bg-gray-50">
            <td class="p-3">Juan Pérez</td>
            <td class="p-3"><input type="number" value="4.5" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="4.0" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="4.2" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3">4.17</td>
          </tr>
          <tr class="border-t hover:bg-gray-50">
            <td class="p-3">María López</td>
            <td class="p-3"><input type="number" value="3.8" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="4.1" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="3.9" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3">3.95</td>
          </tr>
          <tr class="border-t hover:bg-gray-50">
            <td class="p-3">Carlos Gómez</td>
            <td class="p-3"><input type="number" value="5.0" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="4.8" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3"><input type="number" value="5.0" min="0" max="5" step="0.1" class="border rounded-lg px-2 w-16 text-center"></td>
            <td class="p-3">4.95</td>
          </tr>
        </tbody>
      </table>

      <div class="flex justify-end space-x-3">
        <button class="bg-udem-azul text-white px-4 py-2 rounded-lg bg-udem-azul-hover">Guardar Cambios</button>
        <button class="bg-udem-rojo text-white px-4 py-2 rounded-lg bg-udem-rojo-hover">Generar Reporte</button>
      </div>
    </div>
  </main>
</body>
</html>
