<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalles de Registro - Coordinador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --udem-rojo: #B71C1C;
      --udem-rojo-hover: #D32F2F;
      --udem-azul-secundario: #1976D2;
      --udem-azul-hover: #1565C0;
      --udem-verde-exito: #388E3C;
    }
    .bg-udem-rojo { background-color: var(--udem-rojo) !important; }
    .bg-udem-rojo-hover:hover { background-color: var(--udem-rojo-hover) !important; }
    .bg-udem-azul { background-color: var(--udem-azul-secundario) !important; }
    .bg-udem-azul-hover:hover { background-color: var(--udem-azul-hover) !important; }
    .bg-udem-verde { background-color: var(--udem-verde-exito) !important; }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <header class="bg-udem-rojo shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-white">Revisión de Registro de Estudiante</h1>
    <button onclick="window.location.href='index.html#solicitudes-coordinador'" 
      class="bg-white text-udem-rojo px-4 py-2 rounded-lg hover:bg-gray-100">Volver</button>
  </header>

  <main class="p-6 max-w-4xl mx-auto">
    <div class="bg-white p-6 rounded-2xl shadow space-y-6">
      
      <section>
        <h2 class="text-lg font-semibold text-udem-azul border-b pb-2 mb-4">Información del Estudiante</h2>
        <p><strong>Nombre:</strong> Juan Pérez</p>
        <p><strong>Cédula:</strong> 123456789</p>
        <p><strong>Correo:</strong> juan.perez@example.com</p>
        <p><strong>Programa:</strong> Ingeniería de Sistemas</p>
      </section>

      <section>
        <h2 class="text-lg font-semibold text-udem-azul border-b pb-2 mb-4">Documentos Adjuntos</h2>
        <ul class="space-y-2">
          <li class="flex justify-between items-center bg-gray-100 p-3 rounded-lg">
            <span>Documento de Identidad.pdf</span>
            <a href="#" class="text-udem-azul hover:underline">Abrir</a>
          </li>
          <li class="flex justify-between items-center bg-gray-100 p-3 rounded-lg">
            <span>Certificado de Notas.pdf</span>
            <a href="#" class="text-udem-azul hover:underline">Abrir</a>
          </li>
          <li class="flex justify-between items-center bg-gray-100 p-3 rounded-lg">
            <span>Hoja de Vida.docx</span>
            <a href="#" class="text-udem-azul hover:underline">Descargar</a>
          </li>
        </ul>
      </section>

      <div class="flex justify-center space-x-4">
        <button class="bg-udem-verde text-white px-6 py-2 rounded-lg">Aprobar</button>
        <button class="bg-udem-rojo text-white px-6 py-2 rounded-lg bg-udem-rojo-hover">Rechazar</button>
      </div>
    </div>
  </main>
</body>
</html>
